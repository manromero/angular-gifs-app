<div
  class="h-screen overflow-y-auto grid grid-cols-2 md:grid-cols-4 gap-4 pt-5"
  (scroll)="onScroll($event)"
  #groupDiv
>
  @for (group of gifsService.trendingGifsGroup(); track $index) {
    <div class="grid gap-4">
      @for (item of group; track item.id) {
        <div>
          <img
            class="h-full w-full rounded-lg object-contain"
            [src]="item.url"
            alt="{{ item.title }}"
          />
        </div>
      }
    </div>
  }
</div>
